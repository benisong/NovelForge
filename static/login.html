<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelForge · 登录 {{WORKSPACE_NAME}}</title>
<link rel="stylesheet" href="/static/style.css">
<style>
body { display:flex; align-items:center; justify-content:center; padding:24px; overflow:auto; }
.card {
  width:100%; max-width:380px;
  background:var(--bg-secondary); border:1px solid var(--border); border-radius:12px;
  padding:32px 28px; box-shadow:0 8px 32px rgba(0,0,0,.25);
}
.card h1 { font-size:22px; color:var(--accent-purple); text-align:center; letter-spacing:1px; margin-bottom:8px; }
.card .ws-name { text-align:center; color:var(--text-primary); font-size:16px; margin-bottom:4px; }
.card .ws-slug { text-align:center; color:var(--text-muted); font-size:12px; font-family:monospace; margin-bottom:24px; }
.card label { display:block; font-size:12px; color:var(--text-muted); margin-bottom:6px; }
.card input[type=password] {
  width:100%; padding:10px 12px; font-size:14px;
  background:var(--bg-tertiary); border:1px solid var(--border); border-radius:6px;
  color:var(--text-primary); margin-bottom:16px;
}
.card input[type=password]:focus { outline:none; border-color:var(--accent-blue); }
.card button {
  width:100%; padding:11px; font-size:14px; font-weight:600;
  background:var(--accent-blue); color:#fff; border:none; border-radius:6px; cursor:pointer;
}
.card button:hover { filter:brightness(1.1); }
.card .err { background:rgba(255,107,107,.12); border:1px solid var(--accent-red); color:var(--accent-red); padding:8px 12px; border-radius:6px; font-size:12px; margin-bottom:16px; }
.card .back { display:block; text-align:center; margin-top:18px; font-size:12px; color:var(--text-muted); text-decoration:none; }
.card .back:hover { color:var(--accent-blue); }
</style>
</head>
<body>
<form class="card" method="POST" action="/w/{{WORKSPACE_SLUG}}/login">
  <h1>&#9997; NovelForge</h1>
  <div class="ws-name" id="wsName"></div>
  <div class="ws-slug" id="wsSlug"></div>
  <div id="errBox"></div>
  <label for="password">访问密码</label>
  <input type="password" id="password" name="password" required autofocus>
  <button type="submit">进入</button>
  <a class="back" href="/">&larr; 返回选择</a>
</form>
<script>
// 文本来源完全在脚本里赋值，避免模板字符串的 HTML 注入
document.getElementById('wsName').textContent = {{WORKSPACE_NAME_JSON}};
document.getElementById('wsSlug').textContent = {{WORKSPACE_SLUG_JSON}};
const err = {{ERROR_JSON}};
if (err) {
  const box = document.getElementById('errBox');
  box.className = 'err';
  box.textContent = err;
}
</script>
</body>
</html>
