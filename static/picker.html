<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelForge · 选择工作空间</title>
<link rel="stylesheet" href="/static/style.css">
<style>
body { display:flex; align-items:center; justify-content:center; padding:24px; overflow:auto; }
.picker-wrap { width:100%; max-width:720px; }
.picker-header { text-align:center; margin-bottom:32px; }
.picker-header .logo { color:var(--accent-purple); font-weight:700; font-size:28px; letter-spacing:2px; }
.picker-header .tagline { color:var(--text-muted); font-size:13px; margin-top:6px; }
.ws-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:14px; }
.ws-card {
  background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px;
  padding:18px; cursor:pointer; transition:all .15s; text-decoration:none; color:inherit;
  display:flex; flex-direction:column; gap:6px;
}
.ws-card:hover { border-color:var(--accent-blue); transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.2); }
.ws-card .name { font-size:16px; font-weight:600; color:var(--text-primary); }
.ws-card .slug { font-size:11px; color:var(--text-muted); font-family:monospace; }
.ws-card .meta { font-size:11px; color:var(--text-muted); margin-top:4px; }
.empty { text-align:center; padding:48px 20px; background:var(--bg-secondary); border:1px dashed var(--border); border-radius:10px; color:var(--text-muted); }
.empty code { background:var(--bg-tertiary); padding:2px 6px; border-radius:3px; font-size:12px; }
.picker-footer { text-align:center; margin-top:24px; font-size:11px; color:var(--text-muted); }
.picker-footer a { color:var(--accent-blue); text-decoration:none; }
.picker-footer a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="picker-wrap">
  <div class="picker-header">
    <div class="logo">&#9997; NovelForge</div>
    <div class="tagline">选择你的工作空间</div>
  </div>
  <div id="grid" class="ws-grid"></div>
  <div class="picker-footer">
    <a href="/admin">管理</a>
  </div>
</div>
<script>
async function load() {
  try {
    const r = await fetch('/api/workspaces');
    const j = await r.json();
    const grid = document.getElementById('grid');
    if (!j.workspaces || j.workspaces.length === 0) {
      grid.outerHTML = '<div class="empty">暂无工作空间。<br>请先访问 <code>/admin?token=...</code> 创建。</div>';
      return;
    }
    grid.innerHTML = j.workspaces.map(w =>
      '<a class="ws-card" href="/w/' + encodeURIComponent(w.slug) + '/">' +
        '<div class="name">' + escapeHtml(w.name || w.slug) + '</div>' +
        '<div class="slug">' + escapeHtml(w.slug) + '</div>' +
        (w.last_active ? '<div class="meta">最近活跃 ' + escapeHtml(w.last_active) + '</div>' : '<div class="meta">未活跃</div>') +
      '</a>'
    ).join('');
  } catch (e) {
    document.getElementById('grid').outerHTML = '<div class="empty">加载失败：' + e.message + '</div>';
  }
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
load();
</script>
</body>
</html>
