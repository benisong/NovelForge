version: "3.8"

services:
  novel-assistant:
    build: .
    container_name: novel-assistant
    restart: unless-stopped
    ports:
      # 默认只绑定到本机回环；通过 BIND_ADDR=0.0.0.0 可开放到公网（请自行放在反代+HTTPS后面）
      - "${BIND_ADDR:-127.0.0.1}:${PORT:-8000}:8000"
    volumes:
      - novel-data:/app/data
    environment:
      - NOVEL_DATA_DIR=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    read_only: false
    security_opt:
      - no-new-privileges:true

volumes:
  novel-data:
    driver: local
