version: "3.8"

services:
  novel-assistant:
    build: .
    container_name: novel-assistant
    restart: unless-stopped
    ports:
      # 默认对外开放 17000 端口。只允许本机访问可设 BIND_ADDR=127.0.0.1。
      # 公网部署请务必在前面放 Nginx+HTTPS。
      - "${BIND_ADDR:-0.0.0.0}:${PORT:-17000}:17000"
    volumes:
      - novel-data:/app/data
    environment:
      - NOVEL_DATA_DIR=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    read_only: false
    security_opt:
      - no-new-privileges:true

volumes:
  novel-data:
    driver: local
